<!DOCTYPE html>
<html>
<head>
    <title>Zvezdin Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">Početna</a>
    <a href="istorija.html">Istorija</a>
    <a href="legende.html">Legende</a>
    <a href="navijaci.html">Navijači</a>
    <a href="shop.html">Shop</a>
</nav>

<section class="glass section">

    <h2>Zvezdin Shop</h2>

    <p>
        Naruči zvanične proizvode FK Crvene zvezde — dresove, šalove i navijačku opremu.
        Popuni formu i kontaktiraćemo te.
    </p>

    <form class="shop-form">

        <label>Ime i prezime</label>
        <input type="text" placeholder="Unesi ime i prezime" required>

        <label>Email</label>
        <input type="email" placeholder="Unesi email" required>

        <label>Proizvod</label>
        <select>
            <option>Dres Crvena zvezda</option>
            <option>Šal Delije</option>
            <option>Majica Zvezda</option>
            <option>Jakna kluba</option>
        </select>

        <label>Veličina</label>
        <select>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>

        <label>Poruka</label>
        <textarea placeholder="Dodatne informacije..."></textarea>

        <button type="submit">Pošalji porudžbinu</button>

    </form>

</section>

<footer>
    <p>© 2026 FK Crvena Zvezda Shop</p>
</footer>

</body>
</html>
